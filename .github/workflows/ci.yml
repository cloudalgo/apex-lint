name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & type-check (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Type-check apex-core
        run: npx tsc --noEmit -p packages/apex-core/tsconfig.json

      - name: Type-check apex-lint-cli
        run: npx tsc --noEmit -p packages/apex-lint-cli/tsconfig.json

      - name: Smoke-test CLI
        run: node packages/apex-lint-cli/dist/cli.js fixtures/sample-project --format json --output /dev/null
