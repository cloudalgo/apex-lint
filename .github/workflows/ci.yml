name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & type-check (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22', '24']

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build all packages
        run: pnpm build

      - name: Type-check apex-core
        run: npx tsc --noEmit -p packages/apex-core/tsconfig.json

      - name: Type-check apex-lint-cli
        run: npx tsc --noEmit -p packages/apex-lint-cli/tsconfig.json

      - name: Run tests
        run: pnpm test

      - name: Smoke-test CLI
        # The fixture deliberately contains violations (incl. a critical), so we
        # assert the CLI RUNS and emits valid JSON with findings — not that the
        # fixture is clean. `|| true` ignores the lint exit code (1 = violations).
        run: |
          node packages/apex-lint-cli/dist/cli.js fixtures/sample-project --format json --output smoke.json || true
          node -e "const d=require('./smoke.json'); if(!Array.isArray(d.violations)||d.violations.length===0){console.error('CLI emitted no violations — smoke test failed');process.exit(1);} console.log('Smoke OK:',d.violationCount,'violations')"
